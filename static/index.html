<!doctype html>
<html>
  <head>
        <title itemprop="name">HackedYour.info</title>
        <meta name="description" itemprop="description" content="You can modify and share this. Just press CTRL-D">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

        <!-- Open Graph / Facebook -->
        <meta property="og:type" content="website">
        <meta property="og:title" content="HackedYour.info">
        <meta property="og:description" content="You can modify and share this. Just press CTRL-D">
        <meta property="og:image" itemprop="image" content="codeicon.png">

        <!-- Twitter -->
        <meta property="twitter:card" content="summary_large_image">
        <meta property="twitter:title" content="HackedYour.info">
        <meta property="twitter:description" content="You can modify and share this. Just press CTRL-D">
        <meta property="twitter:image" content="codeicon.png">

        <link rel="stylesheet" type="text/css" href="application.min.css"/>
        <link rel="stylesheet" type="text/css" href="highlight.min.css"/>
		
        <script src="//ajax.googleapis.com/ajax/libs/jquery/1.10.2/jquery.min.js"></script>
        <script src="application.min.js"></script>
        <script src="highlight.min.js"></script>

        <script type="text/javascript">
            var app = null;
            var handlePop = function(evt) {
                var path = evt.target.location.pathname;
                if (path === '/') { app.newDocument(true); } else { app.loadDocument(path.substring(1, path.length)); }
            };
            setTimeout(function() {
                window.onpopstate = function(evt) {
                    try { handlePop(evt); } catch(err) { }
                };
            }, 1000);
            $(function() {
                app = new haste();
                handlePop({ target: window });
            });
            hljs.initHighlightingOnLoad();
        </script>
    </head>

    <body>

        <div id="tools">
            <div class="save function" title="Save [Ctrl + S]"></div>
            <div class="new function" title="New [Ctrl + N]"></div>
            <div class="duplicate function" title="Duplicate [Ctrl + D]"></div>
            <div class="raw function" title="Raw [Ctrl + Shift + R]"></div>
            <div class="twitter function" title="Tweet [Ctrl + Shift + T]"></div>
        </div>
        <div id="content">
            <pre id="code" style="display:none;" tabindex="0"><code></code></pre>
            <textarea  placeholder="Paste here, press Ctrl-s, then copy the page URL" spellcheck="false" style="display:none;"></textarea>
        </div>
    </body>
  <script src="activate-power-mode.js"></script>
  <script>
    POWERMODE.colorful = true; // make power mode colorful
    document.body.addEventListener('input', POWERMODE);
</script>
</html>
